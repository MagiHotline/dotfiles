# Cursor
# cursor #8fee96
cursor_trail 3
cursor_trail_start_threshold 0

# Background Blur & Opacity
background_blur 32
background_opacity 0.80

hide_window_decoration yes

# Kitty Mod
kitty_mod cmd+shift

# Tab Bar
tab_bar_min_tabs            2
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         angled
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

#: Window management {{{

map kitty_mod+j next_window
map kitty_mod+k previous_window

#: }}}

# Pixel Scroll
pixel_scroll yes

term xterm-256color

# BEGIN_KITTY_FONTS
font_family      Print Char 21
font_size 16.0
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# BEGIN_KITTY_THEME
# Gruvbox Material Dark Hard
include current-theme.conf
# END_KITTY_THEME
